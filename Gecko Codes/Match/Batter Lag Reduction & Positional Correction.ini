**NOTE: intended for use on laggy TV's/monitors and/or over NetPlay.
*
*Allows the game to play as if 1 frame of input latency is removed.
*
*Batter Lag Reduction: when making contact with the ball, the trajectory calculation runs as if contact was made 1 frame earlier.
*
*Positional Correction: predicts inputs when moving batter in batter's box, and sets position to the intended position assuming 1 frame delay.